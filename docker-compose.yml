version: "3.8"

# Full stack: infra + backend + workers + frontend behind nginx.
# For development use docker-compose.infra.yml and run backend/frontend natively.

include:
  - docker-compose.infra.yml

services:
  backend:
    build: ./backend
    container_name: gv-backend
    env_file: .env
    environment:
      POSTGRES_URL: postgresql://gyanvriksh:gyanvriksh123@postgres:5432/gyanvriksh
      NEO4J_URI: bolt://neo4j:7687
      QDRANT_HOST: qdrant
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MINIO_ENDPOINT: minio:9000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./backend/models:/app/models

  workers:
    build: ./backend
    container_name: gv-workers
    command: python workers/run_workers.py --all
    env_file: .env
    environment:
      POSTGRES_URL: postgresql://gyanvriksh:gyanvriksh123@postgres:5432/gyanvriksh
      NEO4J_URI: bolt://neo4j:7687
      QDRANT_HOST: qdrant
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MINIO_ENDPOINT: minio:9000
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./backend/models:/app/models

  frontend:
    build: ./frontend
    container_name: gv-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
